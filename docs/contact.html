<!DOCTYPE html>
<html>
<head>
    <title>Shravni's Portfolio - Contact</title>
    <style>
        /* --- 1. BASIC STYLE --- */
        body {
            background-color: #030712; 
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            text-align: center;
        }

        /* --- 2. THE MENU --- */
        .navbar {
            background-color: #111827;
            padding: 20px;
            border-bottom: 1px solid #374151;
            position: fixed;
            top: 0;
            width: 100%;
        }

        .navbar a {
            color: #94a3b8;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
            font-weight: bold;
        }

        .navbar a.active {
            color: #6366f1;
        }

        .navbar a:hover {
            color: #6366f1;
        }

        /* --- 3. PAGE CONTENT --- */
        .content {
            padding-top: 150px;
            min-height: 100vh;
        }

        h1 {
            font-size: 40px;
            color: #6366f1;
            margin-bottom: 20px;
        }

        .description {
            color: #94a3b8;
            font-size: 18px;
            margin-bottom: 40px;
        }

        /* Contact Box */
        .box {
            background-color: #1f2937;
            border: 1px solid #374151;
            padding: 40px;
            margin: 20px auto;
            border-radius: 15px;
            max-width: 500px;
            text-align: center;
            transition: 0.3s;
        }

        .box:hover {
            border-color: #6366f1;
        }

        .info-item {
            margin-bottom: 25px;
        }

        .label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6b7280;
            margin-bottom: 5px;
        }

        .value {
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
        }

        .coming-soon {
            color: #4b5563;
            font-style: italic;
            font-weight: normal;
        }

        /* Email Button */
        .btn {
            background-color: #6366f1;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #4f46e5;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <!-- NAVIGATION MENU -->
    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="education.html">Education</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html" class="active">Contact</a>
    </div>

    <!-- MAIN CONTACT CONTENT -->
    <div class="content">
        <h1>Let's Connect</h1>
        <p class="description">Feel free to reach out for collaborations or project inquiries.</p>
        
        <div class="box">
            <!-- Email Address -->
            <div class="info-item">
                <span class="label">Official Email</span>
                <span class="value">shravni.morkhade23@pccoepune.org</span>
            </div>

            <!-- LinkedIn Placeholder -->
            <div class="info-item">
                <span class="label">LinkedIn</span>
                <span class="value coming-soon">Coming soon...</span>
            </div>

            <!-- GitHub Placeholder -->
            <div class="info-item">
                <span class="label">GitHub</span>
                <span class="value coming-soon">Coming soon...</span>
            </div>

            <!-- Action Button -->
            <button class="btn" onclick="window.location.href='mailto:shravni.morkhade23@pccoepune.org'">
                Send Email Now
            </button>
        </div>
    </div>

</body>
</html>
