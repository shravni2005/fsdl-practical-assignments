<!DOCTYPE html>
<html>
<head>
<title>Shop</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#f1f5f9;
}

/* HEADER */
header{
    background:#0f172a;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header button{
    background:#22c55e;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

/* PRODUCTS */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 10px rgba(0,0,0,.1);
    cursor:pointer;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card div{
    padding:12px;
}
</style>
</head>

<body>

<header>
<h2>NeoShop</h2>
<div>
<button onclick="location.href='cart.html'">Cart</button>
<button onclick="location.href='profile.html'">Profile</button>
</div>
</header>

<div class="grid">

<div class="card" onclick="openProduct('Smart Bottle',1200,'images/p1.jpg','Keeps water cold for 24 hours.')">
<img src="images/p1.jpg">
<div>
<h3>Smart Bottle</h3>
<p>₹1200</p>
</div>
</div>

<div class="card" onclick="openProduct('Headphones',3200,'images/p2.jpg','Noise cancelling wireless headphones.')">
<img src="images/p2.jpg">
<div>
<h3>Headphones</h3>
<p>₹3200</p>
</div>
</div>

<div class="card" onclick="openProduct('Shoes',2500,'images/p3.jpg','Lightweight running shoes.')">
<img src="images/p3.jpg">
<div>
<h3>Shoes</h3>
<p>₹2500</p>
</div>
</div>

<div class="card" onclick="openProduct('Watch',4500,'images/p4.jpg','Water resistant smart watch.')">
<img src="images/p4.jpg">
<div>
<h3>Smart Watch</h3>
<p>₹4500</p>
</div>
</div>

</div>

<script>
function openProduct(name,price,image,desc){
    localStorage.setItem("product",
      JSON.stringify({name,price,image,desc})
    );
    window.location.href="product.html";
}
</script>

</body>
</html>
