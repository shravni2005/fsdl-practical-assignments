<!DOCTYPE html>
<html>
<head>
<title>NeoShop | Product</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Segoe UI, Arial;
    background:#f1f5f9;
}

header{
    background:#020617;
    color:white;
    padding:25px 60px;
}
.header-content{
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.icons a{
    color:white;
    font-size:26px;
    margin-left:20px;
}

.product-container{
    max-width:1100px;
    margin:50px auto;
    background:white;
    padding:40px;
    border-radius:15px;
    display:flex;
    gap:50px;
}

.product-container img{
    width:420px;
    height:420px;
    object-fit:contain;
}

.details h2{
    font-size:32px;
}
.price{
    font-size:26px;
    color:green;
    margin:15px 0;
}
.desc{
    font-size:18px;
    color:#444;
}

.qty{
    margin:25px 0;
}
.qty input{
    width:80px;
    padding:10px;
    font-size:18px;
}

button{
    padding:14px 30px;
    font-size:18px;
    background:#1e293b;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="header-content">
<h2>NeoShop</h2>
<div class="icons">
<a href="cart.html"><i class="bi bi-cart"></i></a>
<a href="profile.html"><i class="bi bi-person-circle"></i></a>
</div>
</div>
</header>

<div class="product-container">
    <img id="pimg">
    <div class="details">
        <h2 id="pname"></h2>
        <div class="price" id="pprice"></div>
        <div class="desc" id="pdesc"></div>

        <div class="qty">
            Quantity:
            <input type="number" id="qty" value="1" min="1">
        </div>

        <button onclick="addToCart()">Add to Cart</button>
    </div>
</div>

<script>
let product = JSON.parse(localStorage.getItem("product"));

document.getElementById("pimg").src = product.image;
document.getElementById("pname").innerText = product.name;
document.getElementById("pprice").innerText = "₹" + product.price;
document.getElementById("pdesc").innerText = product.desc;

function addToCart(){
    let qty = document.getElementById("qty").value;
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.push({...product, qty:Number(qty)});
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Added to cart!");
}
</script>

</body>
</html>
