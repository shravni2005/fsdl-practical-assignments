<!DOCTYPE html>
<html>
<head>
<title>NeoShop | Login</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, Arial;
    background:linear-gradient(120deg,#020617,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    padding:50px;
    border-radius:15px;
    width:420px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.login-box h2{
    text-align:center;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:18px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:14px;
    background:#020617;
    color:white;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1e293b;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login to NeoShop</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>
function login(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if(email && pass){
        alert("Login Successful!");
        window.location.href="index.html";
    }else{
        alert("Please enter email and password");
    }
}
</script>

</body>
</html>
