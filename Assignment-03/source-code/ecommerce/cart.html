<!DOCTYPE html>
<html>
<head>
<title>NeoShop | Cart</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Segoe UI, Arial;
    background:#f1f5f9;
}

header{
    background:#020617;
    color:white;
    padding:25px 60px;
}
.header-content{
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.icons a{
    color:white;
    font-size:26px;
    margin-left:20px;
}

.cart-container{
    max-width:1100px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
}

.cart-item{
    display:flex;
    align-items:center;
    gap:20px;
    border-bottom:1px solid #ddd;
    padding:20px 0;
}

.cart-item img{
    width:120px;
    height:120px;
    object-fit:contain;
}

.cart-item h3{
    margin:0;
}

.price{
    font-weight:bold;
    color:green;
}

.remove{
    margin-left:auto;
    background:#dc2626;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
}

.total{
    text-align:right;
    font-size:26px;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
<div class="header-content">
<h2>NeoShop</h2>
<div class="icons">
<a href="index.html"><i class="bi bi-house"></i></a>
<a href="profile.html"><i class="bi bi-person-circle"></i></a>
</div>
</div>
</header>

<div class="cart-container" id="cart"></div>
<div class="total" id="total"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let cartDiv = document.getElementById("cart");
let totalDiv = document.getElementById("total");

function renderCart(){
    cartDiv.innerHTML="";
    let total=0;

    cart.forEach((item,index)=>{
        total += item.price * item.qty;

        cartDiv.innerHTML += `
        <div class="cart-item">
            <img src="${item.image}">
            <div>
                <h3>${item.name}</h3>
                <p>Qty: ${item.qty}</p>
                <p class="price">₹${item.price * item.qty}</p>
            </div>
            <button class="remove" onclick="removeItem(${index})">Remove</button>
        </div>`;
    });

    totalDiv.innerText = "Total: ₹" + total;
}

function removeItem(i){
    cart.splice(i,1);
    localStorage.setItem("cart",JSON.stringify(cart));
    renderCart();
}

renderCart();
</script>

</body>
</html>
